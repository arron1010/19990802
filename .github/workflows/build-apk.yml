name: Build Android APK with EAS

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '目标平台'
        required: true
        default: 'android'
      profile:
        description: 'EAS build profile'
        required: true
        default: 'production'
      build_id:
        description: '构建任务 ID'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EAS_ACCESS_TOKEN }}

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build Android APK
        id: eas_build
        run: |
          eas build --platform android --profile ${{ inputs.profile }} --non-interactive --json > eas-output.json
          cat eas-output.json
          BUILD_URL=$(cat eas-output.json | jq -r '.[0].buildUrl // .[0].url // ""')
          echo "BUILD_URL=$BUILD_URL" >> "$GITHUB_OUTPUT"
        env:
          EAS_ACCESS_TOKEN: ${{ secrets.EAS_ACCESS_TOKEN }}

      - name: Upload build artifact
        if: steps.eas_build.outputs.BUILD_URL == ''
        uses: actions/upload-artifact@v4
        with:
          name: apk-build-${{ github.run_id }}
          path: build-*.apk

      - name: Summary
        run: |
          echo "EAS Build URL: ${{ steps.eas_build.outputs.BUILD_URL }}" >> "$GITHUB_STEP_SUMMARY"
